<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ALPR — Vehicle Identification</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }

  header {
    background: #1a1d2e;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #2a2d3e;
  }
  header h1 { font-size: 1.3rem; font-weight: 600; color: #fff; }
  header span { font-size: 0.85rem; color: #888; }

  .device-badge {
    margin-left: auto;
    background: #1e3a5f;
    color: #5ba4f5;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
  }

  main {
    display: grid;
    grid-template-columns: 1fr 420px;
    grid-template-rows: auto 1fr;
    gap: 16px;
    padding: 16px;
    height: calc(100vh - 61px);
  }

  /* Upload panel */
  .upload-panel {
    grid-column: 1 / -1;
    background: #1a1d2e;
    border-radius: 10px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    border: 1px solid #2a2d3e;
  }
  .upload-panel label {
    font-size: 0.9rem;
    color: #aaa;
    white-space: nowrap;
  }
  #file-input {
    flex: 1;
    background: #0f1117;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 7px 10px;
    color: #e0e0e0;
    font-size: 0.9rem;
  }
  #run-btn {
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 24px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  #run-btn:hover { background: #1d4ed8; }
  #run-btn:disabled { background: #374151; cursor: not-allowed; }

  .progress-wrap { flex: 1; }
  .progress-bar-bg {
    background: #2a2d3e;
    border-radius: 6px;
    height: 8px;
    overflow: hidden;
    display: none;
  }
  .progress-bar-fg {
    height: 100%;
    background: #2563eb;
    border-radius: 6px;
    transition: width 0.3s;
    width: 0%;
  }
  #status-text { font-size: 0.8rem; color: #888; margin-top: 4px; }

  /* Video panel */
  .video-panel {
    background: #1a1d2e;
    border-radius: 10px;
    border: 1px solid #2a2d3e;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-title {
    padding: 10px 16px;
    font-size: 0.85rem;
    font-weight: 600;
    color: #aaa;
    border-bottom: 1px solid #2a2d3e;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  #video-feed {
    flex: 1;
    width: 100%;
    object-fit: contain;
    background: #000;
    display: block;
  }
  .no-feed {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #444;
    font-size: 0.9rem;
  }

  /* Table panel */
  .table-panel {
    background: #1a1d2e;
    border-radius: 10px;
    border: 1px solid #2a2d3e;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .table-title-row {
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #2a2d3e;
  }
  .table-title-row span { font-size: 0.85rem; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
  #row-count { font-size: 0.8rem; color: #2563eb; font-weight: 600; }
  .table-scroll { flex: 1; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  thead th {
    position: sticky;
    top: 0;
    background: #12151f;
    padding: 8px 10px;
    text-align: left;
    color: #666;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    border-bottom: 1px solid #2a2d3e;
  }
  tbody tr { border-bottom: 1px solid #1e2130; transition: background 0.15s; }
  tbody tr:hover { background: #1e2336; }
  tbody td { padding: 7px 10px; vertical-align: middle; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .badge-green  { background: #14532d; color: #86efac; }
  .badge-blue   { background: #1e3a5f; color: #93c5fd; }
  .badge-orange { background: #7c2d12; color: #fdba74; }
  .badge-gray   { background: #1f2937; color: #9ca3af; }
  .conf-pill {
    display: inline-block;
    background: #1f2937;
    color: #9ca3af;
    font-size: 0.72rem;
    padding: 1px 6px;
    border-radius: 10px;
    margin-left: 4px;
  }
  .conf-high { color: #86efac; }
  .conf-med  { color: #fde68a; }
  .conf-low  { color: #fca5a5; }
  #empty-row { text-align: center; color: #444; padding: 24px; }

  /* Primary car card */
  .primary-card {
    background: #0d1f0f;
    border: 2px solid #16a34a;
    border-radius: 12px;
    padding: 16px 20px;
    margin: 12px 16px;
    display: none;
  }
  .primary-card.active { display: block; }
  .primary-card-title {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #4ade80;
    margin-bottom: 12px;
  }
  .primary-fields {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .pf-label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
  .pf-value { font-size: 1.05rem; font-weight: 700; color: #fff; }
  .pf-conf  { font-size: 0.72rem; color: #4ade80; margin-top: 2px; }
  .plate-big { font-size: 1.4rem; font-weight: 800; color: #fdba74; letter-spacing: 0.1em; }
</style>
</head>
<body>

<header>
  <span style="font-size:1.5rem">🎥</span>
  <h1>Vehicle Identification — ALPR</h1>
  <span>Licence Plate · Colour · Brand</span>
  <div class="device-badge" id="device-badge">Loading…</div>
</header>

<main>
  <div class="upload-panel">
    <label>📁 Video file</label>
    <input type="file" id="file-input" accept="video/*"/>
    <button id="run-btn">▶ Process Video</button>
    <div class="progress-wrap">
      <div class="progress-bar-bg" id="progress-bg">
        <div class="progress-bar-fg" id="progress-fg"></div>
      </div>
      <div id="status-text">Upload a video and press Process</div>
    </div>
  </div>

  <div class="video-panel">
    <div class="panel-title">🔴 Live Detection Feed</div>
    <div class="no-feed" id="no-feed-msg">Waiting for video…</div>
    <img id="video-feed" style="display:none" alt="live feed"/>
  </div>

  <div class="table-panel">
    <div class="table-title-row">
      <span>� Live Detection Log</span>
      <span id="row-count">0 rows</span>
    </div>

    <!-- Primary vehicle card -->
    <div class="primary-card" id="primary-card">
      <div class="primary-card-title">🚗 Current Primary Vehicle</div>
      <div class="primary-fields">
        <div>
          <div class="pf-label">Plate</div>
          <div class="pf-value plate-big" id="pc-plate">—</div>
        </div>
        <div>
          <div class="pf-label">Colour</div>
          <div class="pf-value" id="pc-color">—</div>
          <div class="pf-conf" id="pc-color-conf"></div>
        </div>
        <div>
          <div class="pf-label">Brand</div>
          <div class="pf-value" id="pc-brand">—</div>
          <div class="pf-conf" id="pc-brand-conf"></div>
        </div>
      </div>
    </div>

    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Vehicle ID</th>
            <th>Plate</th>
            <th>Colour</th>
            <th>Brand</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="5" id="empty-row">No detections yet</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</main>

<script>
const BASE = window.location.origin;
let pollInterval  = null;
let frameInterval = null;
let lastRowCount  = 0;

fetch(BASE + '/status').then(r => r.json()).then(() => {
  document.getElementById('device-badge').textContent = 'Server Ready';
}).catch(() => {});

function confClass(s) {
  const v = parseFloat(s);
  if (v >= 70) return 'conf-high';
  if (v >= 45) return 'conf-med';
  return 'conf-low';
}

function colorBadge(color) {
  const map = {
    black:'#111111;color:#aaaaaa', white:'#f5f5f5;color:#333333',
    silver:'#64748b;color:#e2e8f0', grey:'#374151;color:#d1d5db',
    gray:'#374151;color:#d1d5db', red:'#7f1d1d;color:#fca5a5',
    blue:'#1e3a5f;color:#93c5fd', green:'#14532d;color:#86efac',
    yellow:'#78350f;color:#fde68a', orange:'#7c2d12;color:#fdba74',
    brown:'#451a03;color:#d97706',
  };
  const key = (color||'').toLowerCase();
  const style = map[key] || '#1f2937;color:#9ca3af';
  const [bg, fg] = style.split(';');
  return `<span class="badge" style="background:${bg};${fg}">${color||'?'}</span>`;
}

function renderLiveRows(rows) {
  const tbody = document.getElementById('table-body');
  const empty = document.getElementById('empty-row');
  if (empty) empty.remove();
  rows.forEach(r => {
    let tr = document.getElementById('live-row-' + r.id);
    if (!tr) {
      tr = document.createElement('tr');
      tr.id = 'live-row-' + r.id;
      tbody.appendChild(tr);
    }
    tr.innerHTML = `
      <td><span class="badge badge-gray">#${r.id}</span></td>
      <td>${r.plate === '—' ? '<span style="color:#555">—</span>'
            : `<span class="badge badge-orange">${r.plate}</span>`}</td>
      <td>${colorBadge(r.color)} <span class="conf-pill ${confClass(r.color_conf||'0')}">${r.color_conf||'?'}</span></td>
      <td><span class="badge badge-blue">${r.brand||'?'}</span> <span class="conf-pill ${confClass(r.brand_conf||'0')}">${r.brand_conf||'?'}</span></td>
      <td style="color:#666;font-size:0.78rem">${r.time||''}</td>
    `;
  });
  lastRowCount = rows.length;
  document.getElementById('row-count').textContent = rows.length + ' row' + (rows.length !== 1 ? 's' : '');
}

function updatePrimaryCard(p) {
  if (!p) return;
  document.getElementById('primary-card').classList.add('active');
  document.getElementById('pc-plate').textContent  = p.plate || '—';
  document.getElementById('pc-color').textContent  = p.color || '—';
  document.getElementById('pc-brand').textContent  = p.brand || '—';
  document.getElementById('pc-color-conf').textContent = p.color_conf ? `Confidence: ${p.color_conf}` : '';
  document.getElementById('pc-brand-conf').textContent = p.brand_conf ? `Confidence: ${p.brand_conf}` : '';
}

function pollStatus() {
  fetch(BASE + '/status').then(r => r.json()).then(data => {
    if (data.rows) renderLiveRows(data.rows);
    if (data.primary) updatePrimaryCard(data.primary);
    if (data.progress !== undefined) {
      document.getElementById('progress-fg').style.width = data.progress + '%';
      document.getElementById('status-text').textContent =
        data.done ? `✅ Done — ${(data.rows||[]).length} vehicle(s) detected`
                  : `Processing… ${data.progress}%  ·  ${(data.rows||[]).length} vehicle(s)`;
    }
    if (data.done) stopPolling();
  }).catch(() => {});
}

function refreshFrame() {
  // Add timestamp to bust cache — browser fetches new JPEG each tick
  document.getElementById('video-feed').src = BASE + '/frame?t=' + Date.now();
}

function stopPolling() {
  if (pollInterval)  { clearInterval(pollInterval);  pollInterval  = null; }
  if (frameInterval) { clearInterval(frameInterval); frameInterval = null; }
  document.getElementById('run-btn').disabled = false;
  document.getElementById('run-btn').textContent = '▶ Process Video';
}

document.getElementById('run-btn').addEventListener('click', async () => {
  const fileInput = document.getElementById('file-input');
  if (!fileInput.files.length) { alert('Please select a video file first.'); return; }

  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.textContent = 'Uploading…';

  // Reset UI
  lastRowCount = 0;
  document.getElementById('table-body').innerHTML =
    '<tr><td colspan="5" id="empty-row">No detections yet</td></tr>';
  document.getElementById('row-count').textContent = '0 rows';
  document.getElementById('primary-card').classList.remove('active');
  document.getElementById('pc-plate').textContent = '—';
  document.getElementById('pc-color').textContent = '—';
  document.getElementById('pc-brand').textContent = '—';
  document.getElementById('pc-color-conf').textContent = '';
  document.getElementById('pc-brand-conf').textContent = '';
  document.getElementById('progress-fg').style.width = '0%';
  document.getElementById('progress-bg').style.display = 'block';
  document.getElementById('status-text').textContent = 'Uploading…';

  const form = new FormData();
  form.append('file', fileInput.files[0]);

  let res;
  try {
    res = await fetch(BASE + '/upload', { method: 'POST', body: form });
    res = await res.json();
  } catch(e) {
    alert('Upload failed: ' + e);
    btn.disabled = false; btn.textContent = '▶ Process Video'; return;
  }

  if (res.error) { alert(res.error); btn.disabled = false; btn.textContent = '▶ Process Video'; return; }

  // Show video feed
  document.getElementById('video-feed').style.display = 'block';
  document.getElementById('no-feed-msg').style.display = 'none';
  btn.textContent = 'Processing…';
  document.getElementById('status-text').textContent = 'Processing…';

  // Poll status (rows + progress) every 800ms
  if (pollInterval)  clearInterval(pollInterval);
  if (frameInterval) clearInterval(frameInterval);
  pollInterval  = setInterval(pollStatus,  800);
  // Poll latest frame every 300ms — fast enough to look smooth
  frameInterval = setInterval(refreshFrame, 300);
});
</script>
</body>
</html>
